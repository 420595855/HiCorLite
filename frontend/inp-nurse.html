<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiCorLite - 住院护士站</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Helvetica Neue',Helvetica,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif;background:#f0f2f5;font-size:14px}
    #app{height:100%;display:flex;flex-direction:column}
    .topbar{height:56px;background:linear-gradient(90deg,#4a6cf7 0%,#6366f1 50%,#8b5cf6 100%);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.2);z-index:100}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .logo-area{display:flex;align-items:center;gap:10px;cursor:pointer}
    .logo-area img{height:32px}
    .logo-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px}
    .breadcrumb{display:flex;align-items:center;gap:8px;margin-left:20px}
    .breadcrumb-item{color:rgba(255,255,255,.6);font-size:13px}
    .breadcrumb-sep{color:rgba(255,255,255,.3)}
    .breadcrumb-current{color:#fff;font-size:14px;font-weight:500}
    .topbar-right{display:flex;align-items:center;gap:14px}
    .topbar-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.7);transition:all .2s}
    .topbar-icon:hover{background:rgba(255,255,255,.15);color:#fff}
    .user-area{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;cursor:pointer;transition:background .2s}
    .user-area:hover{background:rgba(255,255,255,.15)}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#34d399);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}
    .user-name{color:#fff;font-size:14px}
    .main-layout{flex:1;display:flex;overflow:hidden}

    .sidebar{width:260px;background:#fff;border-right:1px solid #e8ecf1;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
    .sidebar-search{padding:16px 14px 12px;border-bottom:1px solid #f0f2f5;flex-shrink:0}
    .search-input-wrap{display:flex;align-items:center;background:#fff;border:1px solid #dcdfe6;border-radius:6px;overflow:hidden;transition:border-color .2s}
    .search-input-wrap:focus-within{border-color:#4a6cf7}
    .search-input-wrap input{flex:1;border:none;outline:none;padding:8px 12px;font-size:13px;color:#303133;background:transparent}
    .search-input-wrap input::placeholder{color:#c0c4cc}
    .search-btn{padding:8px 14px;background:#ecf5ff;color:#409eff;border:none;cursor:pointer;font-size:13px;transition:all .2s;white-space:nowrap}
    .search-btn:hover{background:#d9ecff}
    .menu-list{flex:1;overflow-y:auto;padding:6px 0}
    .menu-list::-webkit-scrollbar{width:4px}
    .menu-list::-webkit-scrollbar-thumb{background:#dcdfe6;border-radius:2px}

    .menu-section{margin-bottom:2px}
    .menu-section-title{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;transition:all .15s;user-select:none}
    .menu-section-title:hover{background:#f5f7fa}
    .menu-section-title .section-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
    .menu-section-title .section-label{flex:1;font-size:13px;font-weight:600;color:#3370ff;letter-spacing:.5px}
    .menu-section-title .expand-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#c0c4cc;transition:transform .2s;flex-shrink:0}
    .menu-section-title .expand-arrow.expanded{transform:rotate(90deg)}

    .menu-item{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 36px;cursor:pointer;transition:all .15s;position:relative}
    .menu-item:hover{background:#f5f7fa}
    .menu-item.active{background:#ecf5ff}
    .menu-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:#409eff;border-radius:0 3px 3px 0}
    .menu-item .item-dot{width:5px;height:5px;border-radius:50%;background:#c0c4cc;flex-shrink:0}
    .menu-item.active .item-dot{background:#409eff}
    .menu-item .item-label{font-size:13px;color:#606266;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .menu-item.active .item-label{color:#303133;font-weight:500}

    .content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f0f2f5}
    .content-header{padding:16px 24px 12px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}
    .content-header h2{font-size:18px;font-weight:600;color:#1e293b;margin-bottom:12px}
    .filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}
    .toolbar-left{display:flex;gap:10px}
    .toolbar-right{display:flex;gap:10px}
    .table-area{flex:1;padding:16px 24px;overflow-y:auto}
    .table-area::-webkit-scrollbar{width:6px}
    .table-area::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
    .pagination-bar{padding:12px 24px;background:#fff;border-top:1px solid #e8ecf1;display:flex;justify-content:flex-end;flex-shrink:0}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .3s ease}
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-area" onclick="window.location.href='index.html'"><img src="logo_icon.png" alt="HiCorLite"><span class="logo-title">HiCorLite</span></div>
      <div class="breadcrumb">
        <span class="breadcrumb-item">总控中心</span><span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">住院护士站</span>
        <template v-if="crumbGroup"><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">{{ crumbGroup }}</span></template>
        <template v-if="crumbChild"><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">{{ crumbChild }}</span></template>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-icon" title="返回首页" onclick="window.location.href='index.html'"><svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M946.5 505L534.6 93.4c-12.5-12.5-32.7-12.5-45.2 0L77.5 505c-12 12-18.8 28.3-18.8 45.3 0 35.3 28.7 64 64 64h43v320c0 17.7 14.3 32 32 32h256V736h128v256h256c17.7 0 32-14.3 32-32V614h43c17 0 33.3-6.7 45.3-18.8 24.9-25 24.9-65.5-.1-90.2z"/></svg></div>
      <div class="user-area"><div class="user-avatar">护</div><span class="user-name">护士长</span></div>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-search">
        <div class="search-input-wrap"><input type="text" v-model="searchText" placeholder="搜索功能..."><button class="search-btn">搜索</button></div>
      </div>
      <div class="menu-list">
        <template v-for="sec in filteredMenu" :key="sec.key">
          <div class="menu-section">
            <div class="menu-section-title" @click="toggleSection(sec.key)">
              <span class="section-icon">{{ sec.icon }}</span>
              <span class="section-label">{{ sec.label }}</span>
              <span class="expand-arrow" :class="{expanded:expandedSections.includes(sec.key)}"><svg viewBox="0 0 1024 1024" width="11" height="11"><path fill="currentColor" d="M384 192v640l384-320z"/></svg></span>
            </div>
            <div v-show="expandedSections.includes(sec.key)">
              <div class="menu-item" v-for="item in sec.items" :key="item.key"
                :class="{active:activeItem===item.key}"
                @click="selectItem(item.key,sec.label,item.label)">
                <span class="item-dot"></span>
                <span class="item-label">{{ item.label }}</span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="content-area">
      <div class="content-header">
        <h2>{{ currentTitle }}</h2>
        <div class="filter-bar">
          <el-input v-model="filterKw" :placeholder="'搜索'+currentTitle+'...'" style="width:260px;" clearable />
          <el-select placeholder="状态" style="width:120px;" clearable><el-option label="全部" value="" /><el-option label="启用" value="1" /><el-option label="停用" value="0" /></el-select>
          <el-button type="primary">查询</el-button><el-button>重置</el-button>
        </div>
      </div>
      <div class="toolbar">
        <div class="toolbar-left"><el-button type="primary">+ 新增</el-button><el-button>批量导入</el-button></div>
        <div class="toolbar-right"><el-button>导出</el-button><el-button>打印</el-button></div>
      </div>

      <div class="table-area" v-if="tableData.length">
        <el-table :data="tableData" stripe border style="width:100%" :header-cell-style="{background:'#f5f7fa',color:'#303133',fontWeight:'600'}">
          <el-table-column v-for="col in tableCols" :key="col.prop" :prop="col.prop" :label="col.label" :width="col.width" :min-width="col.minWidth" show-overflow-tooltip />
          <el-table-column label="状态" width="80" fixed="right">
            <template #default="s"><el-tag :type="['启用','正常','有效','已完成'].includes(s.row.status)?'success':['停用','已出院','已取消'].includes(s.row.status)?'info':'warning'" size="small">{{ s.row.status }}</el-tag></template>
          </el-table-column>
          <el-table-column label="操作" width="160" fixed="right">
            <template #default><el-button type="primary" link size="small">编辑</el-button><el-button type="danger" link size="small">删除</el-button></template>
          </el-table-column>
        </el-table>
      </div>
      <div v-else style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;" class="fade-in">
        <div style="font-size:56px;margin-bottom:16px;opacity:.6">📂</div>
        <div style="font-size:17px;color:#606266;margin-bottom:8px">{{ currentTitle }}</div>
        <div style="font-size:14px">功能模块开发中，敬请期待</div>
      </div>
      <div class="pagination-bar" v-if="tableData.length"><el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="50" :page-sizes="[10,20,50]" /></div>
    </div>
  </div>
</div>

createApp({
  setup(){
    const searchText=ref('');
    const expandedSections=ref(['patient','inp-fee','order-exec']);
    const activeItem=ref('bed-card');
    const crumbGroup=ref('住院患者管理');
    const crumbChild=ref('床卡一览表');
    const filterKw=ref('');

    const filteredMenu=computed(()=>{
      if(!searchText.value)return menuData;
      const kw=searchText.value.toLowerCase();
      return menuData.map(s=>{
        const items=s.items.filter(i=>i.label.toLowerCase().includes(kw));
        if(items.length||s.label.toLowerCase().includes(kw))return{...s,items:s.label.toLowerCase().includes(kw)?s.items:items};
        return null;
      }).filter(Boolean);
    });

    const toggleSection=k=>{const i=expandedSections.value.indexOf(k);i>=0?expandedSections.value.splice(i,1):expandedSections.value.push(k)};
    const selectItem=(key,group,label)=>{activeItem.value=key;crumbGroup.value=group;crumbChild.value=label};
    const currentTitle=computed(()=>crumbChild.value||'住院护士站');
    const tableCols=computed(()=>(tableDataMap[activeItem.value]||{}).cols||[]);
    const tableData=computed(()=>(tableDataMap[activeItem.value]||{}).data||[]);

    return{searchText,expandedSections,activeItem,crumbGroup,crumbChild,filterKw,filteredMenu,toggleSection,selectItem,currentTitle,tableCols,tableData};
  }
}).use(ElementPlus).mount('#app');
</script>
