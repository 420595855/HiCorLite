<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiCorLite - 主数据管理系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}body{font-family:'Helvetica Neue',Helvetica,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif;background:#f0f2f5;font-size:14px}#app{height:100%;display:flex;flex-direction:column}
    .topbar{height:56px;background:linear-gradient(90deg,#4a6cf7 0%,#6366f1 50%,#8b5cf6 100%);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.2);z-index:100}
    .topbar-left{display:flex;align-items:center;gap:0}
    .logo-area{display:flex;align-items:center;gap:10px;cursor:pointer;padding-right:16px;border-right:1px solid rgba(255,255,255,.15)}
    .logo-area img{height:32px}.logo-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px}
    .sys-name-area{display:flex;align-items:center;gap:6px;margin-left:16px}
    .sys-name{font-size:17px;font-weight:600;color:#fff;letter-spacing:1px}
    .breadcrumb{display:flex;align-items:center;gap:8px;margin-left:20px}.breadcrumb-item{color:rgba(255,255,255,.6);font-size:13px}.breadcrumb-sep{color:rgba(255,255,255,.3)}.breadcrumb-current{color:#fff;font-size:14px;font-weight:500}
    .topbar-right{display:flex;align-items:center;gap:14px}
    .topbar-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.7);transition:all .2s}.topbar-icon:hover{background:rgba(255,255,255,.15);color:#fff}
    .user-area{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;cursor:pointer;transition:background .2s}.user-area:hover{background:rgba(255,255,255,.15)}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#34d399);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}.user-name{color:#fff;font-size:14px}
    .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f0f2f5}
    .content-header{padding:16px 24px 12px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}.content-header h2{font-size:18px;font-weight:600;color:#1e293b;margin-bottom:12px}
    .filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}.toolbar-left{display:flex;gap:10px}.toolbar-right{display:flex;gap:10px}
    .table-area{flex:1;padding:16px 24px;overflow-y:auto}.table-area::-webkit-scrollbar{width:6px}.table-area::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
    .pagination-bar{padding:12px 24px;background:#fff;border-top:1px solid #e8ecf1;display:flex;justify-content:flex-end;flex-shrink:0}
    .welcome-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
    .welcome-icon{font-size:72px;margin-bottom:20px;opacity:.7}.welcome-title{font-size:24px;font-weight:700;color:#1e293b;margin-bottom:8px}.welcome-desc{font-size:15px;color:#94a3b8;margin-bottom:24px}
    .welcome-hint{font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px}.welcome-hint kbd{padding:3px 10px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-family:monospace;font-weight:600}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .3s ease}
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-area" onclick="window.location.href='index.html'"><img src="logo_icon.png" alt="HiCorLite"><span class="logo-title">HiCorLite</span></div>
      <div class="sys-name-area">
        <span class="sys-name">主数据管理系统</span>
        <subsys-menu ref="menuRef" system-name="主数据管理系统" :menu-data="menuData" @select="onMenuSelect"></subsys-menu>
      </div>
      <div class="breadcrumb" v-if="crumbChild">
        <span class="breadcrumb-item">主数据管理</span><span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">{{ crumbChild }}</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-icon" title="返回首页" onclick="window.location.href='index.html'"><svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M946.5 505L534.6 93.4c-12.5-12.5-32.7-12.5-45.2 0L77.5 505c-12 12-18.8 28.3-18.8 45.3 0 35.3 28.7 64 64 64h43v320c0 17.7 14.3 32 32 32h256V736h128v256h256c17.7 0 32-14.3 32-32V614h43c17 0 33.3-6.7 45.3-18.8 24.9-25 24.9-65.5-.1-90.2z"/></svg></div>
      <div class="user-area"><div class="user-avatar">管</div><span class="user-name">管理员</span></div>
    </div>
  </div>
  <div class="main-content" v-if="!activeItem">
    <div class="welcome-page fade-in"><div class="welcome-icon">🗂️</div><div class="welcome-title">主数据管理系统</div><div class="welcome-desc">请点击右上角 <b style="color:#4a6cf7;">☰ 菜单图标</b> 选择功能模块</div><div class="welcome-hint">快捷键 <kbd>Ctrl</kbd> + <kbd>M</kbd> 打开菜单</div></div>
  </div>
  <div class="main-content" v-if="activeItem">
    <div class="content-header">
      <h2>{{ crumbChild }}</h2>
      <div class="filter-bar">
        <el-input v-model="filterKw" :placeholder="'搜索'+crumbChild+'...'" style="width:280px;" clearable />
        <el-select placeholder="状态" style="width:120px;" clearable><el-option label="全部" value="" /><el-option label="启用" value="1" /><el-option label="停用" value="0" /></el-select>
        <el-button type="primary">查询</el-button><el-button>重置</el-button>
      </div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left"><el-button type="primary">+ 新增</el-button><el-button>批量导入</el-button></div>
      <div class="toolbar-right"><el-button>导出</el-button><el-button>打印</el-button></div>
    </div>
    <div class="table-area" v-if="tableData.length">
      <el-table :data="tableData" stripe border style="width:100%" :header-cell-style="{background:'#f5f7fa',color:'#303133',fontWeight:'600'}">
        <el-table-column v-for="col in tableCols" :key="col.prop" :prop="col.prop" :label="col.label" :width="col.width" :min-width="col.minWidth" show-overflow-tooltip />
        <el-table-column label="状态" width="80" fixed="right"><template #default="s"><el-tag :type="s.row.status==='启用'?'success':'info'" size="small">{{ s.row.status }}</el-tag></template></el-table-column>
        <el-table-column label="操作" width="160" fixed="right"><template #default><el-button type="primary" link size="small">编辑</el-button><el-button type="danger" link size="small">删除</el-button></template></el-table-column>
      </el-table>
    </div>
    <div v-else style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;" class="fade-in"><div style="font-size:56px;margin-bottom:16px;opacity:.6">📂</div><div style="font-size:17px;color:#606266;margin-bottom:8px">{{ crumbChild }}</div><div style="font-size:14px">功能模块开发中，敬请期待</div></div>
    <div class="pagination-bar" v-if="tableData.length"><el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="50" :page-sizes="[10,20,50]" /></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.full.min.js"></script>
<script src="subsys-menu.js"></script>
<script>
const{createApp,ref,computed}=Vue;
const menuData=[
  {key:'legal-person',icon:'🏢',label:'多法人管理',items:[{key:'legal-person-mgmt',label:'多法人管理'}]},
  {key:'disease-class',icon:'🏥',label:'疾病分类',items:[{key:'disease-class-mgmt',label:'疾病分类'}]},
  {key:'data-element',icon:'📐',label:'数据元',items:[{key:'data-element-mgmt',label:'数据元'}]},
  {key:'tcm-disease',icon:'🍵',label:'中医疾病分类',items:[{key:'tcm-disease-mgmt',label:'中医疾病分类'}]},
  {key:'surgery-grade',icon:'🔪',label:'手术分级',items:[{key:'surgery-grade-mgmt',label:'手术分级'}]},
  {key:'person-category',icon:'👥',label:'人员类别',items:[{key:'person-class',label:'人员分类维护'},{key:'dept-person',label:'科室分管人员维护'}]},
  {key:'treatment-dir',icon:'📁',label:'诊疗目录',items:[{key:'treatment-item',label:'诊疗项目管理'}]},
  {key:'organization',icon:'🏛️',label:'组织机构',items:[{key:'org-mgmt',label:'组织机构'}]},
  {key:'code-table',icon:'📊',label:'通用码表',items:[{key:'general-code',label:'通用码表'},{key:'national-code',label:'国标码表'},{key:'industry-code',label:'行标码表'},{key:'hospital-code',label:'院标码表'},{key:'local-code',label:'地标码表'},{key:'sengbohui-code',label:'盛博汇标码表'}]},
  {key:'user-mgmt',icon:'👤',label:'用户管理',items:[{key:'hospital-staff',label:'医院职工管理'},{key:'sansheng-staff',label:'三生人员管理'},{key:'sansheng-dept',label:'三生科室分布'},{key:'other-staff',label:'其他人员管理'}]},
  {key:'district',icon:'🗺️',label:'行政区划',items:[{key:'district-mgmt',label:'行政区划'}]},
  {key:'specialty',icon:'🏷️',label:'专科类别',items:[{key:'specialty-mgmt',label:'专科类别'}]},
];
const tableDataMap={
  'hospital-staff':{cols:[{prop:'employeeNo',label:'工号',width:90},{prop:'name',label:'姓名',width:90},{prop:'gender',label:'性别',width:60},{prop:'dept',label:'科室',width:130},{prop:'position',label:'职务',width:100},{prop:'title',label:'职称',width:100},{prop:'phone',label:'联系电话',width:130},{prop:'entryDate',label:'入职日期',width:110},{prop:'status',label:'状态',width:80}],data:[{employeeNo:'E0001',name:'张伟',gender:'男',dept:'内科',position:'主任',title:'主任医师',phone:'138****1234',entryDate:'2015-03-10',status:'启用'},{employeeNo:'E0002',name:'李芳',gender:'女',dept:'外科',position:'副主任',title:'副主任医师',phone:'139****5678',entryDate:'2016-07-15',status:'启用'},{employeeNo:'E0003',name:'王丽',gender:'女',dept:'护理部',position:'护士长',title:'主管护师',phone:'137****9012',entryDate:'2017-01-20',status:'启用'},{employeeNo:'E0004',name:'陈静',gender:'女',dept:'药剂科',position:'主任',title:'主任药师',phone:'135****7890',entryDate:'2014-09-01',status:'启用'},{employeeNo:'E0005',name:'刘强',gender:'男',dept:'信息科',position:'工程师',title:'高级工程师',phone:'133****2345',entryDate:'2018-04-12',status:'启用'},{employeeNo:'E0006',name:'周明',gender:'男',dept:'妇产科',position:'医生',title:'主治医师',phone:'132****6789',entryDate:'2019-08-01',status:'停用'}]},
  'legal-person-mgmt':{cols:[{prop:'code',label:'法人编码',width:110},{prop:'name',label:'法人名称',width:200},{prop:'type',label:'法人类型',width:120},{prop:'leader',label:'法定代表人',width:100},{prop:'contact',label:'联系电话',width:130},{prop:'status',label:'状态',width:80}],data:[{code:'LP001',name:'XX市第一人民医院',type:'事业单位',leader:'张院长',contact:'0571-88880001',status:'启用'},{code:'LP002',name:'XX市第一人民医院（南院区）',type:'事业单位',leader:'张院长',contact:'0571-88880002',status:'启用'}]},
  'disease-class-mgmt':{cols:[{prop:'code',label:'疾病编码',width:110},{prop:'name',label:'疾病名称',width:200},{prop:'category',label:'分类',width:120},{prop:'icd',label:'ICD编码',width:120},{prop:'status',label:'状态',width:80}],data:[{code:'A00',name:'霍乱',category:'传染病',icd:'ICD-10:A00',status:'启用'},{code:'I21',name:'急性心肌梗死',category:'循环系统',icd:'ICD-10:I21',status:'启用'},{code:'J18',name:'肺炎',category:'呼吸系统',icd:'ICD-10:J18',status:'启用'},{code:'E11',name:'2型糖尿病',category:'内分泌',icd:'ICD-10:E11',status:'启用'}]},
};
createApp({
  setup(){
    const activeItem=ref('');const crumbGroup=ref('');const crumbChild=ref('');const filterKw=ref('');
    const onMenuSelect=({key,groupLabel,itemLabel})=>{activeItem.value=key;crumbGroup.value=groupLabel;crumbChild.value=itemLabel};
    const tableCols=computed(()=>(tableDataMap[activeItem.value]||{}).cols||[]);
    const tableData=computed(()=>(tableDataMap[activeItem.value]||{}).data||[]);
    return{menuData,activeItem,crumbGroup,crumbChild,filterKw,onMenuSelect,tableCols,tableData};
  }
}).component('subsys-menu',initSubsystemMenu(menuData)).use(ElementPlus).mount('#app');
</script>
</body>
</html>
