<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiCorLite - 应用系统管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
      background: #f0f2f5;
      font-size: 14px;
    }
    #app { height: 100%; display: flex; flex-direction: column; }

    /* ===== 顶部导航栏 ===== */
    .topbar {
      height: 56px;
      background: linear-gradient(90deg, #4a6cf7 0%, #6366f1 50%, #8b5cf6 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2); z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-area img { height: 32px; }
    .logo-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-left: 20px; }
    .breadcrumb-item { color: rgba(255,255,255,0.6); font-size: 13px; }
    .breadcrumb-sep { color: rgba(255,255,255,0.3); }
    .breadcrumb-current { color: #fff; font-size: 14px; font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.7); transition: all 0.2s; }
    .topbar-icon:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .user-area { display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 4px; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .user-area:hover { background: rgba(255,255,255,0.15); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa, #34d399); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 600; }
    .user-name { color: #fff; font-size: 14px; }

    /* ===== 主体布局 ===== */
    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* ===== 左侧菜单 ===== */
    .sidebar {
      width: 240px; background: #fff; border-right: 1px solid #e8ecf1;
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }
    .sidebar-search {
      padding: 16px 14px 12px; border-bottom: 1px solid #f0f2f5; flex-shrink: 0;
    }
    .search-input-wrap {
      display: flex; align-items: center; background: #fff;
      border: 1px solid #dcdfe6; border-radius: 6px; overflow: hidden; transition: border-color 0.2s;
    }
    .search-input-wrap:focus-within { border-color: #4a6cf7; }
    .search-input-wrap input {
      flex: 1; border: none; outline: none; padding: 8px 12px;
      font-size: 13px; color: #303133; background: transparent;
    }
    .search-input-wrap input::placeholder { color: #c0c4cc; }
    .search-btn {
      padding: 8px 14px; background: #ecf5ff; color: #409eff;
      border: none; cursor: pointer; font-size: 13px; transition: all 0.2s; white-space: nowrap;
    }
    .search-btn:hover { background: #d9ecff; }

    .menu-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .menu-list::-webkit-scrollbar { width: 4px; }
    .menu-list::-webkit-scrollbar-thumb { background: #dcdfe6; border-radius: 2px; }

    /* 模块标题（一级） */
    .menu-group-title {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 10px 14px; cursor: pointer;
      transition: all 0.15s; user-select: none;
    }
    .menu-group-title:hover { background: #f5f7fa; }
    .menu-group-title .menu-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-group-title .menu-icon svg { width: 16px; height: 16px; }
    .menu-group-title .menu-label {
      flex: 1; font-size: 14px; font-weight: 500; color: #3370ff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 子项（二级） */
    .menu-child-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px 9px 42px; cursor: pointer;
      transition: all 0.15s; position: relative;
    }
    .menu-child-item:hover { background: #f5f7fa; }
    .menu-child-item.active { background: #ecf5ff; }
    .menu-child-item.active::before {
      content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
      width: 3px; background: #409eff; border-radius: 0 3px 3px 0;
    }
    .menu-child-item .child-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-child-item .child-icon svg { width: 14px; height: 14px; }
    .menu-child-item .child-label { font-size: 13px; color: #606266; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .menu-child-item.active .child-label { color: #303133; font-weight: 500; }

    /* ===== 右侧内容区 ===== */
    .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }
    .content-header {
      padding: 16px 24px 12px; background: #fff;
      border-bottom: 1px solid #e8ecf1; flex-shrink: 0;
    }
    .content-header h2 { font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 12px; }
    .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: #fff; border-bottom: 1px solid #e8ecf1; flex-shrink: 0;
    }
    .toolbar-left { display: flex; gap: 10px; }
    .toolbar-right { display: flex; gap: 10px; }

    .table-area { flex: 1; padding: 16px 24px; overflow-y: auto; }
    .table-area::-webkit-scrollbar { width: 6px; }
    .table-area::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 3px; }

    .pagination-bar {
      padding: 12px 24px; background: #fff; border-top: 1px solid #e8ecf1;
      display: flex; justify-content: flex-end; flex-shrink: 0;
    }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 120px 40px; color: #94a3b8;
    }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
    .empty-title { font-size: 17px; color: #606266; margin-bottom: 8px; }
    .empty-desc { font-size: 14px; color: #94a3b8; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-area" onclick="window.location.href='index.html'">
          <img src="logo_icon.png" alt="HiCorLite">
          <span class="logo-title">HiCorLite</span>
        </div>
        <div class="breadcrumb">
          <span class="breadcrumb-item">总控中心</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">应用系统管理</span>
          <template v-if="currentChild">
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">{{ currentChild }}</span>
          </template>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-icon" title="返回首页" onclick="window.location.href='index.html'">
          <svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M946.5 505L534.6 93.4c-12.5-12.5-32.7-12.5-45.2 0L77.5 505c-12 12-18.8 28.3-18.8 45.3 0 35.3 28.7 64 64 64h43v320c0 17.7 14.3 32 32 32h256V736h128v256h256c17.7 0 32-14.3 32-32V614h43c17 0 33.3-6.7 45.3-18.8 24.9-25 24.9-65.5-.1-90.2z"/></svg>
        </div>
        <div class="topbar-icon" title="消息">
          <svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64zm0 820c-205.4 0-372-166.6-372-372s166.6-372 372-372 372 166.6 372 372-166.6 372-372 372z"/></svg>
        </div>
        <div class="user-area">
          <div class="user-avatar">管</div>
          <span class="user-name">管理员</span>
        </div>
      </div>
    </div>

    <div class="main-layout">
      <!-- 左侧菜单 -->
      <div class="sidebar">
        <div class="sidebar-search">
          <div class="search-input-wrap">
            <input type="text" v-model="searchText" placeholder="搜索菜单...">
            <button class="search-btn">搜索</button>
          </div>
        </div>
        <div class="menu-list">
          <div class="menu-group" v-for="group in filteredMenu" :key="group.key">
            <!-- 一级：模块名称 -->
            <div class="menu-group-title">
              <span class="menu-icon" v-html="group.iconSvg"></span>
              <span class="menu-label">{{ group.label }}</span>
            </div>
            <!-- 二级子项 -->
            <div class="menu-child-item"
              v-for="child in group.children" :key="child.key"
              :class="{ active: activeItem === child.key }"
              @click="selectItem(child.key, child.label)">
              <span class="child-icon" v-html="child.iconSvg || group.defaultChildIcon"></span>
              <span class="child-label">{{ child.label }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧内容区 -->
      <div class="content-area">
        <div class="content-header">
          <h2>{{ currentTitle }}</h2>
          <div class="filter-bar">
            <el-input v-model="filterKeyword" :placeholder="'搜索' + currentTitle + '...'" style="width:280px;" clearable />
            <el-select placeholder="状态" style="width:120px;" clearable>
              <el-option label="全部" value="" />
              <el-option label="启用" value="1" />
              <el-option label="停用" value="0" />
            </el-select>
            <el-button type="primary">查询</el-button>
            <el-button>重置</el-button>
          </div>
        </div>

        <div class="toolbar">
          <div class="toolbar-left">
            <el-button type="primary">+ 新增</el-button>
            <el-button>批量导入</el-button>
          </div>
          <div class="toolbar-right">
            <el-button>导出</el-button>
            <el-button>打印</el-button>
          </div>
        </div>

        <div class="table-area" v-if="currentTableData.length">
          <el-table :data="currentTableData" stripe border style="width:100%"
            :header-cell-style="{ background:'#f5f7fa', color:'#303133', fontWeight:'600' }">
            <el-table-column v-for="col in currentColumns" :key="col.prop" :prop="col.prop" :label="col.label" :width="col.width" :min-width="col.minWidth" show-overflow-tooltip />
            <el-table-column label="状态" width="80" fixed="right">
              <template #default="scope">
                <el-tag :type="scope.row.status === '启用' ? 'success' : scope.row.status === '运行中' ? 'primary' : 'info'" size="small">{{ scope.row.status }}</el-tag>
              </template>
            </el-table-column>
            <el-table-column label="操作" width="160" fixed="right">
              <template #default>
                <el-button type="primary" link size="small">编辑</el-button>
                <el-button type="danger" link size="small">删除</el-button>
              </template>
            </el-table-column>
          </el-table>
        </div>

        <div class="empty-state fade-in" v-else>
          <div class="empty-icon">📂</div>
          <div class="empty-title">{{ currentTitle }}</div>
          <div class="empty-desc">功能模块开发中，敬请期待</div>
        </div>

        <div class="pagination-bar" v-if="currentTableData.length">
          <el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="50" :page-sizes="[10, 20, 50]" />
        </div>
      </div>
    </div>
  </div>

      setup() {
        const searchText = ref('');
        const activeItem = ref('app-role-mgmt'); // 默认选中应用角色
        const currentChild = ref('应用角色');
        const filterKeyword = ref('');

        const filteredMenu = computed(() => {
          if (!searchText.value) return menuData;
          const kw = searchText.value.toLowerCase();
          return menuData.filter(group => {
            const groupMatch = group.label.toLowerCase().includes(kw);
            const childMatch = group.children.some(c => c.label.toLowerCase().includes(kw));
            return groupMatch || childMatch;
          });
        });

        const selectItem = (key, label) => {
          activeItem.value = key;
          currentChild.value = label;
        };

        const currentTitle = computed(() => currentChild.value || '应用系统管理');

        const currentColumns = computed(() => {
          const td = tableDataMap[activeItem.value];
          return td ? td.columns : [];
        });
        const currentTableData = computed(() => {
          const td = tableDataMap[activeItem.value];
          return td ? td.data : [];
        });

        return {
          searchText, activeItem, currentChild, filterKeyword,
          filteredMenu, selectItem, currentTitle,
          currentColumns, currentTableData, menu: menuData,
        };
      }
    }).use(ElementPlus).mount('#app');
