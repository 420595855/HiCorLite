<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiCorLite - 应用系统管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}body{font-family:'Helvetica Neue',Helvetica,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif;background:#f0f2f5;font-size:14px}#app{height:100%;display:flex;flex-direction:column}
    .topbar{height:56px;background:linear-gradient(90deg,#4a6cf7 0%,#6366f1 50%,#8b5cf6 100%);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.2);z-index:100}
    .topbar-left{display:flex;align-items:center;gap:0}
    .logo-area{display:flex;align-items:center;gap:10px;cursor:pointer;padding-right:16px;border-right:1px solid rgba(255,255,255,.15)}.logo-area img{height:32px}.logo-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px}
    .sys-name-area{display:flex;align-items:center;gap:6px;margin-left:16px}.sys-name{font-size:17px;font-weight:600;color:#fff;letter-spacing:1px}
    .breadcrumb{display:flex;align-items:center;gap:8px;margin-left:20px}.breadcrumb-item{color:rgba(255,255,255,.6);font-size:13px}.breadcrumb-sep{color:rgba(255,255,255,.3)}.breadcrumb-current{color:#fff;font-size:14px;font-weight:500}
    .topbar-right{display:flex;align-items:center;gap:14px}.topbar-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.7);transition:all .2s}.topbar-icon:hover{background:rgba(255,255,255,.15);color:#fff}
    .user-area{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;cursor:pointer;transition:background .2s}.user-area:hover{background:rgba(255,255,255,.15)}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#34d399);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}.user-name{color:#fff;font-size:14px}
    .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f0f2f5}
    .content-header{padding:16px 24px 12px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}.content-header h2{font-size:18px;font-weight:600;color:#1e293b;margin-bottom:12px}
    .filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}.toolbar-left{display:flex;gap:10px}.toolbar-right{display:flex;gap:10px}
    .table-area{flex:1;padding:16px 24px;overflow-y:auto}.table-area::-webkit-scrollbar{width:6px}.table-area::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
    .pagination-bar{padding:12px 24px;background:#fff;border-top:1px solid #e8ecf1;display:flex;justify-content:flex-end;flex-shrink:0}
    .welcome-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
    .welcome-icon{font-size:72px;margin-bottom:20px;opacity:.7}.welcome-title{font-size:24px;font-weight:700;color:#1e293b;margin-bottom:8px}.welcome-desc{font-size:15px;color:#94a3b8;margin-bottom:24px}
    .welcome-hint{font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px}.welcome-hint kbd{padding:3px 10px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-family:monospace;font-weight:600}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .3s ease}
    .subsys-dashboard{padding:28px;overflow-y:auto;flex:1}.subsys-dashboard-header{margin-bottom:24px}.subsys-dashboard-header h2{font-size:22px;font-weight:700;color:#1e293b;margin-bottom:6px}.subsys-dashboard-header p{font-size:14px;color:#94a3b8}
    .subsys-quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:24px}.subsys-quick-card{background:#fff;border:1px solid #e8ecf1;border-radius:14px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .25s}.subsys-quick-card:hover{border-color:#93c5fd;transform:translateY(-3px);box-shadow:0 8px 24px rgba(59,130,246,.1)}.subsys-quick-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}.subsys-quick-card span{font-size:13px;font-weight:500;color:#334155}
    .subsys-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px}.subsys-stat-card{background:#fff;border:1px solid #e8ecf1;border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;transition:all .2s}.subsys-stat-card:hover{border-color:#c7d2fe;box-shadow:0 4px 12px rgba(0,0,0,.04)}.subsys-stat-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px}.subsys-stat-value{font-size:22px;font-weight:700;color:#1e293b}.subsys-stat-label{font-size:13px;color:#94a3b8;margin-top:3px}
    .subsys-bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.subsys-panel{background:#fff;border:1px solid #e8ecf1;border-radius:14px;overflow:hidden}.subsys-panel-header{padding:14px 18px;font-size:15px;font-weight:600;color:#1e293b;border-bottom:1px solid #f1f5f9}.subsys-panel-body{padding:6px 18px}.subsys-panel-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f8fafc}.subsys-panel-item:last-child{border-bottom:none}.subsys-panel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.subsys-panel-text{flex:1;font-size:13px;color:#334155}.subsys-panel-time{font-size:12px;color:#94a3b8;flex-shrink:0}.subsys-panel-tag{font-size:11px;padding:2px 8px;border-radius:5px;flex-shrink:0;font-weight:500}
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-area" onclick="window.location.href='index.html'"><img src="logo_icon.png" alt="HiCorLite"><span class="logo-title">HiCorLite</span></div>
      <div class="sys-name-area">
        <span class="sys-name">应用系统管理</span>
        <subsys-menu ref="menuRef" system-name="应用系统管理" :menu-data="menuData" @select="onMenuSelect"></subsys-menu>
      </div>
      <div class="breadcrumb" v-if="crumbChild"><span class="breadcrumb-item">应用系统管理</span><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">{{ crumbChild }}</span></div>
    </div>
    <div class="topbar-right">
      <div class="topbar-icon" title="返回首页" onclick="window.location.href='index.html'"><svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M946.5 505L534.6 93.4c-12.5-12.5-32.7-12.5-45.2 0L77.5 505c-12 12-18.8 28.3-18.8 45.3 0 35.3 28.7 64 64 64h43v320c0 17.7 14.3 32 32 32h256V736h128v256h256c17.7 0 32-14.3 32-32V614h43c17 0 33.3-6.7 45.3-18.8 24.9-25 24.9-65.5-.1-90.2z"/></svg></div>
      <div class="user-area"><div class="user-avatar">管</div><span class="user-name">管理员</span></div>
    </div>
  </div>
  <div class="main-content" v-if="!activeItem">
    <div class="subsys-dashboard fade-in">
      <div class="subsys-dashboard-header"><h2>⚙️ 应用系统管理</h2><p>欢迎使用应用系统管理，以下是模块概览</p></div>
      <div class="subsys-quick-grid">
        <div class="subsys-quick-card" v-for="g in menuData.slice(0,6)" :key="g.key" @click="onMenuSelect({key:g.items[0].key,groupLabel:g.label,itemLabel:g.items[0].label})">
          <div class="subsys-quick-icon" style="background:#eff3ff">{{ g.icon }}</div><span>{{ g.label }}</span>
        </div>
      </div>
      <div class="subsys-stats-grid">
        <div class="subsys-stat-card"><div class="subsys-stat-icon" style="background:#eff6ff;color:#3b82f6">📱</div><div><div class="subsys-stat-value">40</div><div class="subsys-stat-label">应用模块</div></div></div>
        <div class="subsys-stat-card"><div class="subsys-stat-icon" style="background:#f0fdf4;color:#22c55e">✅</div><div><div class="subsys-stat-value">38</div><div class="subsys-stat-label">已启用</div></div></div>
        <div class="subsys-stat-card"><div class="subsys-stat-icon" style="background:#fffbeb;color:#f59e0b">🔧</div><div><div class="subsys-stat-value">12</div><div class="subsys-stat-label">待配置</div></div></div>
        <div class="subsys-stat-card"><div class="subsys-stat-icon" style="background:#fef2f2;color:#ef4444">⚠️</div><div><div class="subsys-stat-value">2</div><div class="subsys-stat-label">异常模块</div></div></div>
      </div>
      <div class="subsys-bottom-grid">
        <div class="subsys-panel"><div class="subsys-panel-header">📋 最近操作</div><div class="subsys-panel-body">
          <div class="subsys-panel-item"><div class="subsys-panel-dot" style="background:#22c55e"></div><div class="subsys-panel-text">医保管理模块配置已更新</div><div class="subsys-panel-time">30分钟前</div></div>
          <div class="subsys-panel-item"><div class="subsys-panel-dot" style="background:#3b82f6"></div><div class="subsys-panel-text">新增检验报告模块</div><div class="subsys-panel-time">2小时前</div></div>
        </div></div>
        <div class="subsys-panel"><div class="subsys-panel-header">📌 待办事项</div><div class="subsys-panel-body">
          <div class="subsys-panel-item"><div class="subsys-panel-dot" style="background:#f59e0b"></div><div class="subsys-panel-text">2个模块待版本升级</div><div class="subsys-panel-tag" style="background:#fffbeb;color:#f59e0b">待办</div></div>
          <div class="subsys-panel-item"><div class="subsys-panel-dot" style="background:#3b82f6"></div><div class="subsys-panel-text">系统参数需审核</div><div class="subsys-panel-tag" style="background:#eff6ff;color:#3b82f6">通知</div></div>
        </div></div>
      </div>
    </div>
  </div>
  <div class="main-content" v-if="activeItem">
    <div class="content-header"><h2>{{ crumbChild }}</h2><div class="filter-bar"><el-input v-model="filterKw" :placeholder="'搜索'+crumbChild+'...'" style="width:280px;" clearable /><el-select placeholder="状态" style="width:120px;" clearable><el-option label="全部" value="" /><el-option label="启用" value="1" /><el-option label="停用" value="0" /></el-select><el-button type="primary">查询</el-button><el-button>重置</el-button></div></div>
    <div class="toolbar"><div class="toolbar-left"><el-button type="primary">+ 新增</el-button></div><div class="toolbar-right"><el-button>导出</el-button></div></div>
    <div class="table-area" v-if="tableData.length">
      <el-table :data="tableData" stripe border style="width:100%" :header-cell-style="{background:'#f5f7fa',color:'#303133',fontWeight:'600'}">
        <el-table-column v-for="col in tableCols" :key="col.prop" :prop="col.prop" :label="col.label" :width="col.width" :min-width="col.minWidth" show-overflow-tooltip />
        <el-table-column label="状态" width="80" fixed="right"><template #default="s"><el-tag :type="s.row.status==='启用'||s.row.status==='运行中'?'success':'info'" size="small">{{ s.row.status }}</el-tag></template></el-table-column>
        <el-table-column label="操作" width="160" fixed="right"><template #default><el-button type="primary" link size="small">编辑</el-button><el-button type="danger" link size="small">删除</el-button></template></el-table-column>
      </el-table>
    </div>
    <div v-else style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;" class="fade-in"><div style="font-size:56px;margin-bottom:16px;opacity:.6">📂</div><div style="font-size:17px;color:#606266;margin-bottom:8px">{{ crumbChild }}</div><div style="font-size:14px">功能模块开发中，敬请期待</div></div>
    <div class="pagination-bar" v-if="tableData.length"><el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="50" :page-sizes="[10,20,50]" /></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.full.min.js"></script>
<script src="subsys-menu.js"></script>
<script>
const{createApp,ref,computed}=Vue;
const menuData=[
  {key:'system-reg',icon:'📝',label:'系统注册',items:[{key:'sys-register',label:'系统注册'}]},
  {key:'app-mgmt',icon:'📱',label:'应用管理',items:[{key:'app-manage',label:'应用管理'}]},
  {key:'app-role',icon:'🎭',label:'应用角色',items:[{key:'app-role-mgmt',label:'应用角色'}]},
  {key:'sys-params',icon:'⚙️',label:'系统参数',items:[{key:'sys-param-mgmt',label:'系统参数'}]},
  {key:'error-report',icon:'⚠️',label:'异常上报',items:[{key:'issue-list',label:'问题列表'}]},
];
const tableDataMap={
  'app-role-mgmt':{cols:[{prop:'roleCode',label:'角色编码',width:120},{prop:'roleName',label:'角色名称',width:150},{prop:'appScope',label:'应用范围',width:180},{prop:'userCount',label:'用户数',width:80},{prop:'desc',label:'角色描述',minWidth:200},{prop:'createTime',label:'创建时间',width:160},{prop:'status',label:'状态',width:80}],data:[{roleCode:'ROLE_ADMIN',roleName:'系统管理员',appScope:'全部应用',userCount:5,desc:'拥有系统所有功能权限',createTime:'2025-01-15 10:00',status:'启用'},{roleCode:'ROLE_DOCTOR',roleName:'门诊医生',appScope:'门诊医生站、电子病历',userCount:128,desc:'门诊诊疗相关功能权限',createTime:'2025-01-15 10:00',status:'启用'},{roleCode:'ROLE_NURSE',roleName:'住院护士',appScope:'住院护士站、护理工作站',userCount:96,desc:'住院护理相关功能权限',createTime:'2025-01-15 10:00',status:'启用'},{roleCode:'ROLE_PHARM',roleName:'药剂师',appScope:'药库工作站、药房工作站',userCount:24,desc:'药品管理相关功能权限',createTime:'2025-01-15 10:00',status:'启用'},{roleCode:'ROLE_FEE',roleName:'收费员',appScope:'门诊挂号收费、住院费用管理',userCount:32,desc:'收费结算相关功能权限',createTime:'2025-01-15 10:00',status:'启用'},{roleCode:'ROLE_LAB',roleName:'检验技师',appScope:'医技工作站',userCount:18,desc:'检验相关功能权限',createTime:'2025-02-20 14:30',status:'启用'}]},
  'sys-register':{cols:[{prop:'sysCode',label:'系统编码',width:120},{prop:'sysName',label:'系统名称',width:180},{prop:'version',label:'版本号',width:100},{prop:'vendor',label:'供应商',width:140},{prop:'contact',label:'联系人',width:100},{prop:'deployDate',label:'部署日期',width:120},{prop:'status',label:'状态',width:80}],data:[{sysCode:'HIS-CORE',sysName:'HiCorLite 核心系统',version:'v1.0.0',vendor:'盛博汇',contact:'张工',deployDate:'2025-01-10',status:'运行中'},{sysCode:'LIS',sysName:'检验信息系统',version:'v3.2.1',vendor:'某检验厂商',contact:'李工',deployDate:'2025-02-15',status:'运行中'},{sysCode:'PACS',sysName:'影像归档与通信系统',version:'v5.0.0',vendor:'某影像厂商',contact:'王工',deployDate:'2025-02-15',status:'运行中'},{sysCode:'EMR',sysName:'电子病历系统',version:'v2.1.0',vendor:'某EMR厂商',contact:'赵工',deployDate:'2025-03-01',status:'运行中'}]},
  'app-manage':{cols:[{prop:'appCode',label:'应用编码',width:120},{prop:'appName',label:'应用名称',width:180},{prop:'category',label:'分类',width:100},{prop:'sysBelong',label:'所属系统',width:140},{prop:'accessUrl',label:'访问地址',width:200},{prop:'status',label:'状态',width:80}],data:[{appCode:'APP-OUTDOC',appName:'门诊医生站',category:'临床业务',sysBelong:'HIS-CORE',accessUrl:'/out-doctor',status:'启用'},{appCode:'APP-IMPDOC',appName:'住院医生站',category:'临床业务',sysBelong:'HIS-CORE',accessUrl:'/inp-doctor',status:'启用'},{appCode:'APP-PHARM',appName:'药房工作站',category:'药品管理',sysBelong:'HIS-CORE',accessUrl:'/pharmacy',status:'启用'},{appCode:'APP-LIS',appName:'检验系统',category:'医技业务',sysBelong:'LIS',accessUrl:'/lis',status:'启用'}]},
  'sys-param-mgmt':{cols:[{prop:'paramCode',label:'参数编码',width:160},{prop:'paramName',label:'参数名称',width:180},{prop:'paramValue',label:'参数值',width:140},{prop:'scope',label:'作用域',width:100},{prop:'desc',label:'说明',minWidth:200},{prop:'status',label:'状态',width:80}],data:[{paramCode:'SYS.LOGIN_TIMEOUT',paramName:'登录超时时间',paramValue:'1800',scope:'全局',desc:'用户登录后无操作自动退出的时间（秒）',status:'启用'},{paramCode:'SYS.PWD_POLICY',paramName:'密码策略',paramValue:'strong',scope:'全局',desc:'密码强度策略',status:'启用'},{paramCode:'OUTPATIENT.MAX_PATIENTS',paramName:'门诊最大接诊数',paramValue:'60',scope:'门诊',desc:'单个医生单日最大接诊患者数',status:'启用'},{paramCode:'PHARM.STOCK_ALERT',paramName:'药品库存预警阈值',paramValue:'100',scope:'药品',desc:'药品库存低于此值时触发预警',status:'启用'}]},
  'issue-list':{cols:[{prop:'issueNo',label:'问题编号',width:120},{prop:'title',label:'问题标题',width:200},{prop:'module',label:'所属模块',width:120},{prop:'level',label:'严重程度',width:100},{prop:'reporter',label:'上报人',width:90},{prop:'reportTime',label:'上报时间',width:160},{prop:'status',label:'状态',width:90}],data:[{issueNo:'ISS-2026001',title:'门诊收费结算页面偶发卡顿',module:'门诊收费',level:'一般',reporter:'收费员小王',reportTime:'2026-05-08 14:23',status:'处理中'},{issueNo:'ISS-2026002',title:'检验报告PDF导出格式错乱',module:'医技工作站',level:'严重',reporter:'检验科张三',reportTime:'2026-05-07 09:15',status:'已解决'},{issueNo:'ISS-2026005',title:'病历模板保存后内容丢失',module:'电子病历',level:'致命',reporter:'外科王医生',reportTime:'2026-05-04 08:50',status:'处理中'}]},
};
createApp({
  setup(){
    const activeItem=ref('');const crumbGroup=ref('');const crumbChild=ref('');const filterKw=ref('');
    const onMenuSelect=({key,groupLabel,itemLabel})=>{activeItem.value=key;crumbGroup.value=groupLabel;crumbChild.value=itemLabel};
    const tableCols=computed(()=>(tableDataMap[activeItem.value]||{}).cols||[]);
    const tableData=computed(()=>(tableDataMap[activeItem.value]||{}).data||[]);
    return{menuData,activeItem,crumbGroup,crumbChild,filterKw,onMenuSelect,tableCols,tableData};
  }
}).component('subsys-menu',initSubsystemMenu(menuData)).use(ElementPlus).mount('#app');
</script>
</body>
</html>
