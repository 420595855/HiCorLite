<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiCorLite - 统一用户管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden}body{font-family:'Helvetica Neue',Helvetica,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif;background:#f0f2f5;font-size:14px}#app{height:100%;display:flex;flex-direction:column}
    .topbar{height:56px;background:linear-gradient(90deg,#4a6cf7 0%,#6366f1 50%,#8b5cf6 100%);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.2);z-index:100}
    .topbar-left{display:flex;align-items:center;gap:0}.logo-area{display:flex;align-items:center;gap:10px;cursor:pointer;padding-right:16px;border-right:1px solid rgba(255,255,255,.15)}.logo-area img{height:32px}.logo-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px}
    .sys-name-area{display:flex;align-items:center;gap:6px;margin-left:16px}.sys-name{font-size:17px;font-weight:600;color:#fff;letter-spacing:1px}
    .breadcrumb{display:flex;align-items:center;gap:8px;margin-left:20px}.breadcrumb-item{color:rgba(255,255,255,.6);font-size:13px}.breadcrumb-sep{color:rgba(255,255,255,.3)}.breadcrumb-current{color:#fff;font-size:14px;font-weight:500}
    .topbar-right{display:flex;align-items:center;gap:14px}.topbar-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.7);transition:all .2s}.topbar-icon:hover{background:rgba(255,255,255,.15);color:#fff}
    .user-area{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;cursor:pointer;transition:background .2s}.user-area:hover{background:rgba(255,255,255,.15)}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#34d399);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}.user-name{color:#fff;font-size:14px}
    .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f0f2f5}
    .content-header{padding:16px 24px 12px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}.content-header h2{font-size:18px;font-weight:600;color:#1e293b;margin-bottom:12px}.filter-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#fff;border-bottom:1px solid #e8ecf1;flex-shrink:0}.toolbar-left{display:flex;gap:10px}.toolbar-right{display:flex;gap:10px}
    .table-area{flex:1;padding:16px 24px;overflow-y:auto}.table-area::-webkit-scrollbar{width:6px}.table-area::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
    .pagination-bar{padding:12px 24px;background:#fff;border-top:1px solid #e8ecf1;display:flex;justify-content:flex-end;flex-shrink:0}
    .welcome-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
    .welcome-icon{font-size:72px;margin-bottom:20px;opacity:.7}.welcome-title{font-size:24px;font-weight:700;color:#1e293b;margin-bottom:8px}.welcome-desc{font-size:15px;color:#94a3b8;margin-bottom:24px}
    .welcome-hint{font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px}.welcome-hint kbd{padding:3px 10px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-family:monospace;font-weight:600}
    /* 个性化设置页面 */
    .settings-page{flex:1;overflow-y:auto;padding:24px}.settings-page::-webkit-scrollbar{width:6px}.settings-page::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
    .settings-card{background:#fff;border-radius:12px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04);overflow:hidden}
    .settings-card-header{display:flex;align-items:center;gap:10px;padding:18px 24px;border-bottom:1px solid #f0f2f5}
    .settings-card-header .sc-icon{font-size:20px}.settings-card-header .sc-title{font-size:16px;font-weight:600;color:#1e293b}.settings-card-header .sc-desc{font-size:13px;color:#94a3b8;margin-left:12px}
    .settings-card-body{padding:20px 24px}
    .setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #f5f7fa}.setting-row:last-child{border-bottom:none}
    .setting-info{flex:1}.setting-label{font-size:14px;font-weight:500;color:#303133;margin-bottom:4px}.setting-desc{font-size:13px;color:#94a3b8;line-height:1.5}
    .setting-control{flex-shrink:0;margin-left:24px}
    .theme-preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:12px}
    .theme-card{border:2px solid #e8ecf1;border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}.theme-card:hover{border-color:#a0cfff}.theme-card.selected{border-color:#409eff;background:#ecf5ff}
    .theme-card .theme-bar{height:6px;border-radius:3px;margin-bottom:8px}.theme-card .theme-name{font-size:13px;color:#606266}.theme-card.selected .theme-name{color:#409eff;font-weight:500}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .3s ease}
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-area" onclick="window.location.href='index.html'"><img src="logo_icon.png" alt="HiCorLite"><span class="logo-title">HiCorLite</span></div>
      <div class="sys-name-area">
        <span class="sys-name">统一用户管理</span>
        <subsys-menu ref="menuRef" system-name="统一用户管理" :menu-data="menuData" @select="onMenuSelect"></subsys-menu>
      </div>
      <div class="breadcrumb" v-if="crumbChild"><span class="breadcrumb-item">统一用户管理</span><span class="breadcrumb-sep">/</span><span class="breadcrumb-current">{{ crumbChild }}</span></div>
    </div>
    <div class="topbar-right">
      <div class="topbar-icon" title="返回首页" onclick="window.location.href='index.html'"><svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M946.5 505L534.6 93.4c-12.5-12.5-32.7-12.5-45.2 0L77.5 505c-12 12-18.8 28.3-18.8 45.3 0 35.3 28.7 64 64 64h43v320c0 17.7 14.3 32 32 32h256V736h128v256h256c17.7 0 32-14.3 32-32V614h43c17 0 33.3-6.7 45.3-18.8 24.9-25 24.9-65.5-.1-90.2z"/></svg></div>
      <div class="user-area"><div class="user-avatar">管</div><span class="user-name">管理员</span></div>
    </div>
  </div>
  <div class="main-content" v-if="!activeItem"><div class="welcome-page fade-in"><div class="welcome-icon">👥</div><div class="welcome-title">统一用户管理</div><div class="welcome-desc">请点击右上角 <b style="color:#4a6cf7;">☰ 菜单图标</b> 选择功能模块</div><div class="welcome-hint">快捷键 <kbd>Ctrl</kbd> + <kbd>M</kbd> 打开菜单</div></div></div>

  <!-- 个性化设置页面 -->
  <template v-if="activeItem==='personal-settings'">
    <div class="settings-page">
      <div class="settings-card fade-in">
        <div class="settings-card-header"><span class="sc-icon">🎨</span><span class="sc-title">主题外观</span><span class="sc-desc">选择您喜欢的界面主题风格</span></div>
        <div class="settings-card-body">
          <div class="setting-row"><div class="setting-info"><div class="setting-label">主题配色</div><div class="setting-desc">系统提供四种预设配色方案</div><div class="theme-preview-grid"><div class="theme-card" v-for="t in themes" :key="t.key" :class="{selected:selectedTheme===t.key}" @click="selectedTheme=t.key"><div class="theme-bar" :style="{background:t.color}"></div><div class="theme-name">{{ t.name }}</div></div></div></div></div>
          <div class="setting-row"><div class="setting-info"><div class="setting-label">字体大小</div><div class="setting-desc">调整系统全局字体大小</div></div><div class="setting-control"><el-slider v-model="fontSize" :min="12" :max="18" :step="1" style="width:180px;" show-stops /></div></div>
          <div class="setting-row"><div class="setting-info"><div class="setting-label">消息提示音</div><div class="setting-desc">收到新消息时播放提示音</div></div><div class="setting-control"><el-switch v-model="notifySound" /></div></div>
        </div>
      </div>
      <div style="text-align:right;padding:8px 0 20px;"><el-button>重置默认</el-button><el-button type="primary" size="large">保存设置</el-button></div>
    </div>
  </template>

  <!-- 工作组管理 / 用户授权 -->
  <div class="main-content" v-if="activeItem&&activeItem!=='personal-settings'">
    <div class="content-header"><h2>{{ crumbChild }}</h2><div class="filter-bar"><el-input v-model="filterKw" :placeholder="'搜索'+crumbChild+'...'" style="width:280px;" clearable /><el-select placeholder="状态" style="width:120px;" clearable><el-option label="全部" value="" /><el-option label="启用" value="1" /><el-option label="停用" value="0" /></el-select><el-button type="primary">查询</el-button><el-button>重置</el-button></div></div>
    <div class="toolbar"><div class="toolbar-left"><el-button type="primary">+ 新增</el-button></div><div class="toolbar-right"><el-button>导出</el-button></div></div>
    <div class="table-area" v-if="tableData.length">
      <el-table :data="tableData" stripe border style="width:100%" :header-cell-style="{background:'#f5f7fa',color:'#303133',fontWeight:'600'}">
        <el-table-column v-for="col in tableCols" :key="col.prop" :prop="col.prop" :label="col.label" :width="col.width" :min-width="col.minWidth" show-overflow-tooltip />
        <el-table-column label="状态" width="80" fixed="right"><template #default="s"><el-tag :type="s.row.status==='启用'||s.row.status==='有效'?'success':'info'" size="small">{{ s.row.status }}</el-tag></template></el-table-column>
        <el-table-column label="操作" width="160" fixed="right"><template #default><el-button type="primary" link size="small">编辑</el-button><el-button type="danger" link size="small">删除</el-button></template></el-table-column>
      </el-table>
    </div>
    <div v-else style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;" class="fade-in"><div style="font-size:56px;margin-bottom:16px;opacity:.6">📂</div><div style="font-size:17px;color:#606266;margin-bottom:8px">{{ crumbChild }}</div><div style="font-size:14px">功能模块开发中，敬请期待</div></div>
    <div class="pagination-bar" v-if="tableData.length"><el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="50" :page-sizes="[10,20,50]" /></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@3.5.13/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.full.min.js"></script>
<script src="subsys-menu.js"></script>
<script>
const{createApp,ref,computed}=Vue;
const menuData=[
  {key:'personal',icon:'⚙️',label:'个性化设置',items:[{key:'personal-settings',label:'个性化设置'}]},
  {key:'authorization',icon:'🔐',label:'分级授权',items:[{key:'work-group',label:'工作组管理'},{key:'user-auth',label:'用户授权'}]},
];
const tableDataMap={
  'work-group':{cols:[{prop:'groupCode',label:'工作组编码',width:130},{prop:'groupName',label:'工作组名称',width:180},{prop:'department',label:'所属部门',width:130},{prop:'leader',label:'负责人',width:90},{prop:'memberCount',label:'成员数',width:80},{prop:'scope',label:'权限范围',minWidth:200},{prop:'createTime',label:'创建时间',width:160},{prop:'status',label:'状态',width:80}],data:[{groupCode:'WG-NEIKE',groupName:'内科工作组',department:'内科',leader:'张伟',memberCount:28,scope:'门诊医生站、住院医生站、电子病历',createTime:'2025-01-20 10:00',status:'启用'},{groupCode:'WG-WAIKE',groupName:'外科工作组',department:'外科',leader:'孙浩',memberCount:22,scope:'门诊医生站、住院医生站、手术管理',createTime:'2025-01-20 10:00',status:'启用'},{groupCode:'WG-HULI',groupName:'护理工作组',department:'护理部',leader:'王丽',memberCount:96,scope:'住院护士站、护理工作站、护理PDA',createTime:'2025-01-25 09:00',status:'启用'},{groupCode:'WG-YAOXUE',groupName:'药学工作组',department:'药学部',leader:'陈静',memberCount:24,scope:'药库工作站、药房工作站、用药监控',createTime:'2025-01-25 09:00',status:'启用'},{groupCode:'WG-XXK',groupName:'信息科工作组',department:'信息科',leader:'刘强',memberCount:6,scope:'全部应用（系统管理员权限）',createTime:'2025-01-15 08:00',status:'启用'}]},
  'user-auth':{cols:[{prop:'employeeNo',label:'工号',width:90},{prop:'name',label:'姓名',width:90},{prop:'dept',label:'科室',width:120},{prop:'roles',label:'授权角色',width:160},{prop:'workGroup',label:'所属工作组',width:130},{prop:'authLevel',label:'授权级别',width:100},{prop:'validFrom',label:'授权起始',width:110},{prop:'validTo',label:'授权截止',width:110},{prop:'status',label:'状态',width:80}],data:[{employeeNo:'E0001',name:'张伟',dept:'内科',roles:'门诊医生',workGroup:'内科工作组',authLevel:'部分',validFrom:'2025-01-20',validTo:'2026-12-31',status:'有效'},{employeeNo:'E0003',name:'王丽',dept:'护理部',roles:'住院护士',workGroup:'护理工作组',authLevel:'部分',validFrom:'2025-01-25',validTo:'2026-12-31',status:'有效'},{employeeNo:'E0005',name:'刘强',dept:'信息科',roles:'系统管理员',workGroup:'信息科工作组',authLevel:'全部',validFrom:'2025-01-15',validTo:'2099-12-31',status:'有效'},{employeeNo:'E0006',name:'周明',dept:'妇产科',roles:'门诊医生、住院医生',workGroup:'妇产科工作组',authLevel:'部分',validFrom:'2025-01-20',validTo:'2026-06-30',status:'有效'}]},
};
createApp({
  setup(){
    const activeItem=ref('');const crumbGroup=ref('');const crumbChild=ref('');const filterKw=ref('');
    const selectedTheme=ref('blue');const fontSize=ref(14);const notifySound=ref(true);
    const themes=[{key:'blue',name:'经典蓝',color:'linear-gradient(90deg,#4a6cf7,#6366f1)'},{key:'green',name:'清新绿',color:'linear-gradient(90deg,#10b981,#34d399)'},{key:'orange',name:'活力橙',color:'linear-gradient(90deg,#f59e0b,#fbbf24)'},{key:'dark',name:'暗夜黑',color:'linear-gradient(90deg,#1e293b,#334155)'}];
    const onMenuSelect=({key,groupLabel,itemLabel})=>{activeItem.value=key;crumbGroup.value=groupLabel;crumbChild.value=itemLabel};
    const tableCols=computed(()=>(tableDataMap[activeItem.value]||{}).cols||[]);
    const tableData=computed(()=>(tableDataMap[activeItem.value]||{}).data||[]);
    return{menuData,activeItem,crumbGroup,crumbChild,filterKw,onMenuSelect,tableCols,tableData,selectedTheme,fontSize,notifySound,themes};
  }
}).component('subsys-menu',initSubsystemMenu(menuData)).use(ElementPlus).mount('#app');
</script>
</body>
</html>
