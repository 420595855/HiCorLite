<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiCorLite - 统一用户管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.9.1/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
      background: #f0f2f5; font-size: 14px;
    }
    #app { height: 100%; display: flex; flex-direction: column; }

    /* ===== 顶部导航栏 ===== */
    .topbar {
      height: 56px;
      background: linear-gradient(90deg, #4a6cf7 0%, #6366f1 50%, #8b5cf6 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2); z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-area img { height: 32px; }
    .logo-title { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-left: 20px; }
    .breadcrumb-item { color: rgba(255,255,255,0.6); font-size: 13px; }
    .breadcrumb-sep { color: rgba(255,255,255,0.3); }
    .breadcrumb-current { color: #fff; font-size: 14px; font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.7); transition: all 0.2s; }
    .topbar-icon:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .user-area { display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 4px; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .user-area:hover { background: rgba(255,255,255,0.15); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #60a5fa, #34d399); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 600; }
    .user-name { color: #fff; font-size: 14px; }

    /* ===== 主体布局 ===== */
    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* ===== 左侧菜单 ===== */
    .sidebar {
      width: 240px; background: #fff; border-right: 1px solid #e8ecf1;
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }
    .sidebar-search { padding: 16px 14px 12px; border-bottom: 1px solid #f0f2f5; flex-shrink: 0; }
    .search-input-wrap {
      display: flex; align-items: center; background: #fff;
      border: 1px solid #dcdfe6; border-radius: 6px; overflow: hidden; transition: border-color 0.2s;
    }
    .search-input-wrap:focus-within { border-color: #4a6cf7; }
    .search-input-wrap input { flex: 1; border: none; outline: none; padding: 8px 12px; font-size: 13px; color: #303133; background: transparent; }
    .search-input-wrap input::placeholder { color: #c0c4cc; }
    .search-btn { padding: 8px 14px; background: #ecf5ff; color: #409eff; border: none; cursor: pointer; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
    .search-btn:hover { background: #d9ecff; }

    .menu-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .menu-list::-webkit-scrollbar { width: 4px; }
    .menu-list::-webkit-scrollbar-thumb { background: #dcdfe6; border-radius: 2px; }

    .menu-group-title {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 10px 14px; cursor: pointer;
      transition: all 0.15s; user-select: none;
    }
    .menu-group-title:hover { background: #f5f7fa; }
    .menu-group-title .menu-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-group-title .menu-icon svg { width: 16px; height: 16px; }
    .menu-group-title .menu-label { flex: 1; font-size: 14px; font-weight: 500; color: #3370ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .menu-child-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px 9px 42px; cursor: pointer;
      transition: all 0.15s; position: relative;
    }
    .menu-child-item:hover { background: #f5f7fa; }
    .menu-child-item.active { background: #ecf5ff; }
    .menu-child-item.active::before {
      content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
      width: 3px; background: #409eff; border-radius: 0 3px 3px 0;
    }
    .menu-child-item .child-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .menu-child-item .child-icon svg { width: 14px; height: 14px; }
    .menu-child-item .child-label { font-size: 13px; color: #606266; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .menu-child-item.active .child-label { color: #303133; font-weight: 500; }

    /* ===== 右侧内容区 ===== */
    .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }
    .content-header { padding: 16px 24px 12px; background: #fff; border-bottom: 1px solid #e8ecf1; flex-shrink: 0; }
    .content-header h2 { font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 12px; }
    .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: #fff; border-bottom: 1px solid #e8ecf1; flex-shrink: 0; }
    .toolbar-left { display: flex; gap: 10px; }
    .toolbar-right { display: flex; gap: 10px; }

    .table-area { flex: 1; padding: 16px 24px; overflow-y: auto; }
    .table-area::-webkit-scrollbar { width: 6px; }
    .table-area::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 3px; }

    .pagination-bar { padding: 12px 24px; background: #fff; border-top: 1px solid #e8ecf1; display: flex; justify-content: flex-end; flex-shrink: 0; }

    /* ===== 个性化设置页面样式 ===== */
    .settings-page { flex: 1; overflow-y: auto; padding: 24px; }
    .settings-page::-webkit-scrollbar { width: 6px; }
    .settings-page::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 3px; }

    .settings-card {
      background: #fff; border-radius: 12px; margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.04);
      overflow: hidden;
    }
    .settings-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 24px; border-bottom: 1px solid #f0f2f5;
    }
    .settings-card-header .sc-icon { font-size: 20px; }
    .settings-card-header .sc-title { font-size: 16px; font-weight: 600; color: #1e293b; }
    .settings-card-header .sc-desc { font-size: 13px; color: #94a3b8; margin-left: 12px; }
    .settings-card-body { padding: 20px 24px; }

    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid #f5f7fa;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-info { flex: 1; }
    .setting-label { font-size: 14px; font-weight: 500; color: #303133; margin-bottom: 4px; }
    .setting-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; }
    .setting-control { flex-shrink: 0; margin-left: 24px; }

    /* 预览卡片 */
    .theme-preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 12px; }
    .theme-card {
      border: 2px solid #e8ecf1; border-radius: 10px; padding: 12px;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .theme-card:hover { border-color: #a0cfff; }
    .theme-card.selected { border-color: #409eff; background: #ecf5ff; }
    .theme-card .theme-bar { height: 6px; border-radius: 3px; margin-bottom: 8px; }
    .theme-card .theme-name { font-size: 13px; color: #606266; }
    .theme-card.selected .theme-name { color: #409eff; font-weight: 500; }

    /* 头像选择 */
    .avatar-grid { display: flex; gap: 14px; margin-top: 12px; }
    .avatar-option {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; border: 2px solid #e8ecf1;
      transition: all 0.2s;
    }
    .avatar-option:hover { border-color: #a0cfff; transform: scale(1.05); }
    .avatar-option.selected { border-color: #409eff; box-shadow: 0 0 0 3px rgba(64,158,255,0.15); }

    /* ===== 用户授权 - 角色矩阵 ===== */
    .auth-matrix { margin-top: 16px; }
    .auth-matrix table { width: 100%; border-collapse: collapse; }
    .auth-matrix th, .auth-matrix td { padding: 10px 14px; text-align: center; border: 1px solid #ebeef5; font-size: 13px; }
    .auth-matrix th { background: #f5f7fa; color: #303133; font-weight: 600; }
    .auth-matrix td { color: #606266; }
    .auth-matrix tr:hover td { background: #f5f7fa; }
    .auth-check { color: #67c23a; font-size: 18px; }
    .auth-uncheck { color: #dcdfe6; font-size: 18px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo-area" onclick="window.location.href='index.html'">
          <img src="logo_icon.png" alt="HiCorLite">
          <span class="logo-title">HiCorLite</span>
        </div>
        <div class="breadcrumb">
          <span class="breadcrumb-item">总控中心</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">统一用户管理</span>
          <template v-if="currentChild">
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">{{ currentChild }}</span>
          </template>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-icon" title="返回首页" onclick="window.location.href='index.html'">
          <svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M946.5 505L534.6 93.4c-12.5-12.5-32.7-12.5-45.2 0L77.5 505c-12 12-18.8 28.3-18.8 45.3 0 35.3 28.7 64 64 64h43v320c0 17.7 14.3 32 32 32h256V736h128v256h256c17.7 0 32-14.3 32-32V614h43c17 0 33.3-6.7 45.3-18.8 24.9-25 24.9-65.5-.1-90.2z"/></svg>
        </div>
        <div class="topbar-icon" title="消息">
          <svg viewBox="0 0 1024 1024" width="18" height="18"><path fill="currentColor" d="M512 64C264.6 64 64 264.6 64 512s200.6 448 448 448 448-200.6 448-448S759.4 64 512 64zm0 820c-205.4 0-372-166.6-372-372s166.6-372 372-372 372 166.6 372 372-166.6 372-372 372z"/></svg>
        </div>
        <div class="user-area">
          <div class="user-avatar">管</div>
          <span class="user-name">管理员</span>
        </div>
      </div>
    </div>

    <div class="main-layout">
      <!-- 左侧菜单 -->
      <div class="sidebar">
        <div class="sidebar-search">
          <div class="search-input-wrap">
            <input type="text" v-model="searchText" placeholder="搜索菜单...">
            <button class="search-btn">搜索</button>
          </div>
        </div>
        <div class="menu-list">
          <div class="menu-group" v-for="group in filteredMenu" :key="group.key">
            <div class="menu-group-title">
              <span class="menu-icon" v-html="group.iconSvg"></span>
              <span class="menu-label">{{ group.label }}</span>
            </div>
            <div class="menu-child-item"
              v-for="child in group.children" :key="child.key"
              :class="{ active: activeItem === child.key }"
              @click="selectItem(child.key, child.label)">
              <span class="child-icon" v-html="child.iconSvg || group.defaultChildIcon"></span>
              <span class="child-label">{{ child.label }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧内容区 -->
      <div class="content-area">

        <!-- ===== 个性化设置页面 ===== -->
        <template v-if="activeItem === 'personal-settings'">
          <div class="settings-page">
            <!-- 主题外观 -->
            <div class="settings-card fade-in">
              <div class="settings-card-header">
                <span class="sc-icon">🎨</span>
                <span class="sc-title">主题外观</span>
                <span class="sc-desc">选择您喜欢的界面主题风格</span>
              </div>
              <div class="settings-card-body">
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">主题配色</div>
                    <div class="setting-desc">系统提供四种预设配色方案，选择后全局生效</div>
                    <div class="theme-preview-grid">
                      <div class="theme-card" v-for="t in themes" :key="t.key"
                        :class="{ selected: selectedTheme === t.key }"
                        @click="selectedTheme = t.key">
                        <div class="theme-bar" :style="{ background: t.color }"></div>
                        <div class="theme-name">{{ t.name }}</div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">侧边栏位置</div>
                    <div class="setting-desc">切换侧边栏显示在左侧或右侧</div>
                  </div>
                  <div class="setting-control">
                    <el-radio-group v-model="sidebarPos">
                      <el-radio-button label="left">左侧</el-radio-button>
                      <el-radio-button label="right">右侧</el-radio-button>
                    </el-radio-group>
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">菜单折叠</div>
                    <div class="setting-desc">默认折叠侧边栏菜单，仅显示图标</div>
                  </div>
                  <div class="setting-control">
                    <el-switch v-model="menuCollapsed" />
                  </div>
                </div>
              </div>
            </div>

            <!-- 界面显示 -->
            <div class="settings-card fade-in" style="animation-delay:0.1s">
              <div class="settings-card-header">
                <span class="sc-icon">🖥️</span>
                <span class="sc-title">界面显示</span>
                <span class="sc-desc">调整界面元素的显示方式</span>
              </div>
              <div class="settings-card-body">
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">字体大小</div>
                    <div class="setting-desc">调整系统全局字体大小，范围 12px ~ 18px</div>
                  </div>
                  <div class="setting-control">
                    <el-slider v-model="fontSize" :min="12" :max="18" :step="1" style="width:180px;" show-stops />
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">表格密度</div>
                    <div class="setting-desc">设置数据表格的行间距密度</div>
                  </div>
                  <div class="setting-control">
                    <el-radio-group v-model="tableDensity">
                      <el-radio-button label="loose">宽松</el-radio-button>
                      <el-radio-button label="default">默认</el-radio-button>
                      <el-radio-button label="compact">紧凑</el-radio-button>
                    </el-radio-group>
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">显示面包屑导航</div>
                    <div class="setting-desc">在页面顶部显示当前位置的面包屑路径</div>
                  </div>
                  <div class="setting-control">
                    <el-switch v-model="showBreadcrumb" />
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">显示标签页</div>
                    <div class="setting-desc">多页面打开时以标签页形式展示，方便切换</div>
                  </div>
                  <div class="setting-control">
                    <el-switch v-model="showTabs" />
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">动画效果</div>
                    <div class="setting-desc">开启页面切换和交互的动画效果</div>
                  </div>
                  <div class="setting-control">
                    <el-switch v-model="enableAnimation" />
                  </div>
                </div>
              </div>
            </div>

            <!-- 通知偏好 -->
            <div class="settings-card fade-in" style="animation-delay:0.2s">
              <div class="settings-card-header">
                <span class="sc-icon">🔔</span>
                <span class="sc-title">通知偏好</span>
                <span class="sc-desc">设置消息通知的方式和频率</span>
              </div>
              <div class="settings-card-body">
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">桌面通知</div>
                    <div class="setting-desc">允许系统发送浏览器桌面通知</div>
                  </div>
                  <div class="setting-control">
                    <el-switch v-model="desktopNotify" />
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">消息提示音</div>
                    <div class="setting-desc">收到新消息时播放提示音</div>
                  </div>
                  <div class="setting-control">
                    <el-switch v-model="notifySound" />
                  </div>
                </div>
                <div class="setting-row">
                  <div class="setting-info">
                    <div class="setting-label">待办提醒</div>
                    <div class="setting-desc">设置待办任务提前提醒的时间</div>
                  </div>
                  <div class="setting-control">
                    <el-select v-model="remindBefore" style="width:140px;">
                      <el-option label="5 分钟前" value="5" />
                      <el-option label="15 分钟前" value="15" />
                      <el-option label="30 分钟前" value="30" />
                      <el-option label="1 小时前" value="60" />
                    </el-select>
                  </div>
                </div>
              </div>
            </div>

            <!-- 个人头像 -->
            <div class="settings-card fade-in" style="animation-delay:0.3s">
              <div class="settings-card-header">
                <span class="sc-icon">👤</span>
                <span class="sc-title">个人头像</span>
                <span class="sc-desc">选择系统默认头像样式</span>
              </div>
              <div class="settings-card-body">
                <div class="avatar-grid">
                  <div class="avatar-option" v-for="av in avatarOptions" :key="av.key"
                    :class="{ selected: selectedAvatar === av.key }"
                    :style="{ background: av.bg }"
                    @click="selectedAvatar = av.key">
                    {{ av.emoji }}
                  </div>
                </div>
              </div>
            </div>

            <!-- 保存按钮 -->
            <div style="text-align:right;padding:8px 0 20px;">
              <el-button>重置默认</el-button>
              <el-button type="primary" size="large">保存设置</el-button>
            </div>
          </div>
        </template>

        <!-- ===== 工作组管理 ===== -->
        <template v-if="activeItem === 'work-group'">
          <div class="content-header">
            <h2>工作组管理</h2>
            <div class="filter-bar">
              <el-input v-model="filterKeyword" placeholder="搜索工作组名称..." style="width:280px;" clearable />
              <el-select placeholder="所属部门" style="width:150px;" clearable>
                <el-option label="全部" value="" />
                <el-option label="临床科室" value="clinical" />
                <el-option label="医技科室" value="tech" />
                <el-option label="行政后勤" value="admin" />
                <el-option label="药学部" value="pharmacy" />
              </el-select>
              <el-button type="primary">查询</el-button>
              <el-button>重置</el-button>
            </div>
          </div>
          <div class="toolbar">
            <div class="toolbar-left">
              <el-button type="primary">+ 新建工作组</el-button>
            </div>
            <div class="toolbar-right">
              <el-button>导出</el-button>
            </div>
          </div>
          <div class="table-area">
            <el-table :data="workGroupData" stripe border style="width:100%"
              :header-cell-style="{ background:'#f5f7fa', color:'#303133', fontWeight:'600' }">
              <el-table-column prop="groupCode" label="工作组编码" width="130" />
              <el-table-column prop="groupName" label="工作组名称" width="180" />
              <el-table-column prop="department" label="所属部门" width="130" />
              <el-table-column prop="leader" label="负责人" width="90" />
              <el-table-column prop="memberCount" label="成员数" width="80" align="center" />
              <el-table-column prop="scope" label="权限范围" min-width="200" show-overflow-tooltip />
              <el-table-column prop="createTime" label="创建时间" width="160" />
              <el-table-column label="状态" width="80" fixed="right">
                <template #default="scope">
                  <el-tag :type="scope.row.status === '启用' ? 'success' : 'info'" size="small">{{ scope.row.status }}</el-tag>
                </template>
              </el-table-column>
              <el-table-column label="操作" width="180" fixed="right">
                <template #default>
                  <el-button type="primary" link size="small">成员</el-button>
                  <el-button type="primary" link size="small">编辑</el-button>
                  <el-button type="danger" link size="small">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
          </div>
          <div class="pagination-bar">
            <el-pagination background layout="total, sizes, prev, pager, next, jumper" :total="20" :page-sizes="[10, 20, 50]" />
          </div>
        </template>

        <!-- ===== 用户授权 ===== -->
        <template v-if="activeItem === 'user-auth'">
